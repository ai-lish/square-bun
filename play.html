<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Square‑Bun（練習模式）</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#1a365d;--orange:#ed8936;--card-radius:12px}
    html,body{height:100%;margin:0;font-family:'Noto Sans HK',system-ui,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#f6fbff, #ffffff);color:#0b2540}
    .app{max-width:1100px;margin:18px auto;padding:18px}
    header{display:flex;align-items:center;gap:12px}
    h1{margin:0;font-size:1.1rem;color:var(--blue)}
    .controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
    select,input[type=number]{padding:8px;border-radius:8px;border:1px solid #dbe6f3}
    button{background:var(--orange);border:none;color:white;padding:10px 12px;border-radius:10px;cursor:pointer}
    button.secondary{background:#cde0f6;color:var(--blue)}
    main{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-top:18px}
    .table-area{background:linear-gradient(180deg,#ffffff,#f7fbff);padding:12px;border-radius:12px;border:1px solid #e6eef8;min-height:480px}
    .circle{position:relative;height:640px}
    .card{position:absolute;width:56px;height:70px;border-radius:10px;background:white;display:flex;align-items:center;justify-content:center;border:2px solid #e6eef8;box-shadow:0 4px 8px rgba(10,20,40,0.06);cursor:pointer;user-select:none}
    .card.target{background:#fdebd0;border-color:var(--orange)}
    .card.disabled{opacity:0.35;pointer-events:none}
    .side{background:#fff;padding:12px;border-radius:12px;border:1px solid #e6eef8;overflow:auto}
    .players{display:flex;flex-direction:column;gap:8px}
    .player{display:flex;justify-content:space-between;padding:8px;border-radius:8px;background:#fbfdff;border:1px solid #eef6ff}
    .pile{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .smallcard{width:36px;height:44px;border-radius:6px;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:0.8rem}
    .dice{display:flex;gap:8px;align-items:center;margin-left:8px}
    .big{font-size:1.1rem;font-weight:700;color:var(--blue)}
    footer{margin-top:12px;font-size:0.9rem;color:#456}
    @media(max-width:900px){main{grid-template-columns:1fr} .circle{height:520px}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Square‑Bun（練習模式）</h1>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div class="big">主題：數字遊戲</div>
      </div>
    </header>

    <div class="controls">
      <label>人數
        <select id="players">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </label>
      <label>模式 <select id="mode"><option value="practice" selected>練習</option></select></label>
      <button id="start">開始遊戲</button>
      <button id="roll" class="secondary">擲骰</button>
      <div class="dice"><div id="die1" class="smallcard">-</div><div id="die2" class="smallcard">-</div></div>
      <button id="squareShout">平方包大聲公</button>
      <div style="margin-left:auto;color:#999;font-size:0.9rem">Cards: 1–88 (硬編)</div>
    </div>

    <main>
      <section class="table-area">
        <div id="table" class="circle" aria-label="桌面區"></div>
      </section>
      <aside class="side">
        <div style="display:flex;justify-content:space-between;align-items:center"><strong>玩家</strong><div id="turnInfo"></div></div>
        <div class="players" id="playersList"></div>
        <hr />
        <div><strong>規則摘錄</strong>
          <ul>
            <li>每輪擲兩粒骰 (1–6)。標的數為能被任一骰整除的卡。</li>
            <li>玩家點擊非標的卡為正確；點錯會被懲罰（卡回庫並失去一張已贏卡回庫）。</li>
            <li>平方包：按下大聲公並點選卡來舉報平方數（例如 1,4,9,16...）。正確獲獎，錯誤有懲罰。</li>
            <li>當一張卡被拿走，從庫補牌至桌面卡數 = 人數。</li>
          </ul>
        </div>
        <hr />
        <div><strong>牌堆</strong><div id="deckCount"></div></div>
        <div style="margin-top:8px"><button id="endGame" class="secondary">結束並計分</button></div>
      </aside>
    </main>

    <footer>純客戶端示範，數據不會存到伺服器；樣式：深藍 + 橙色。</footer>
  </div>

  <script>
    // square-bun minimal implementation
    const TOTAL=88
    let deck=[]
    let tableCards=[]
    let playersData=[]
    let currentPlayers=4
    let tableSize=4
    let die1=0,die2=0
    let squareShout=false

    const tableEl=document.getElementById('table')
    const playersSel=document.getElementById('players')
    const startBtn=document.getElementById('start')
    const rollBtn=document.getElementById('roll')
    const die1el=document.getElementById('die1')
    const die2el=document.getElementById('die2')
    const playersList=document.getElementById('playersList')
    const deckCount=document.getElementById('deckCount')
    const turnInfo=document.getElementById('turnInfo')
    const squareBtn=document.getElementById('squareShout')
    const endBtn=document.getElementById('endGame')

    function makeDeck(){deck=[];for(let i=1;i<=TOTAL;i++)deck.push(i);shuffle(deck)}
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

    function start(){currentPlayers=parseInt(playersSel.value);tableSize=currentPlayers;makeDeck();playersData=[];for(let i=0;i<currentPlayers;i++){playersData.push({id:i,name:'P'+(i+1),pile:[]})}tableCards=[];for(let i=0;i<tableSize;i++)drawToTable();renderPlayers();renderTable();updateDeck();die1=0;die2=0;die1el.textContent='-';die2el.textContent='-';turnInfo.textContent=''}

    function drawToTable(){if(deck.length===0) return; const c=deck.shift(); tableCards.push(c)}

    function renderPlayers(){playersList.innerHTML='';playersData.forEach(p=>{const div=document.createElement('div');div.className='player';div.innerHTML=`<div>${p.name}</div><div>${p.pile.length} 張</div>`;playersList.appendChild(div)})}

    function renderTable(){tableEl.innerHTML='';const R=Math.min(300, window.innerWidth*0.35);const cx=tableEl.clientWidth/2;const cy=tableEl.clientHeight/2;const n=tableCards.length;for(let i=0;i<n;i++){const ang=(2*Math.PI*i/n)-Math.PI/2;const x=cx+Math.cos(ang)*(R-60);const y=cy+Math.sin(ang)*(R-60);const v=tableCards[i];const card=document.createElement('div');card.className='card';card.style.left=(x-28)+'px';card.style.top=(y-35)+'px';card.textContent=v;card.dataset.val=v;card.onclick=()=>onCardClick(v,i);if(isTarget(v)) card.classList.add('target');tableEl.appendChild(card)}}

    function isTarget(v){if(die1===0||die2===0) return false;return v%die1===0 || v%die2===0}

    function onCardClick(val,index){if(squareShout){handleSquareReport(val,index);return}const player=playersData[0]; // single-player scoring simplified: always player 1
      if(isTarget(val)){ // wrong click
        // penalty: return clicked card to bottom of deck and if player has any pile card, return one to deck
        deck.push(val);tableCards.splice(index,1);
        if(player.pile.length>0){const c=player.pile.pop();deck.push(c)}
        // refill
        if(deck.length>0)drawToTable();
        renderPlayers();renderTable();updateDeck();
        alert('錯誤：該卡為目標（可被骰整除）。懲罰：卡回庫。')
      } else {
        // correct
        player.pile.push(val);
        tableCards.splice(index,1);
        if(deck.length>0)drawToTable();
        renderPlayers();renderTable();updateDeck();
      }}

    function handleSquareReport(val,index){const player=playersData[0];const isSquare = Number.isInteger(Math.sqrt(val));squareShout=false;squareBtn.textContent='平方包大聲公';
      if(isSquare){player.pile.push(val);tableCards.splice(index,1);alert('舉報正確：平方數！獎勵拿走此卡。')} else {deck.push(val);tableCards.splice(index,1); if(player.pile.length>0){deck.push(player.pile.pop())} alert('舉報錯誤：該卡非平方數，懲罰已執行。')} if(deck.length>0){drawToTable()}renderPlayers();renderTable();updateDeck();}

    function rollDice(){die1=rand1();die2=rand1();die1el.textContent=die1;die2el.textContent=die2;renderTable();}
    function rand1(){return Math.floor(Math.random()*6)+1}

    function updateDeck(){deckCount.textContent=`剩餘: ${deck.length} 張`}

    squareBtn.addEventListener('click',()=>{squareShout=!squareShout;squareBtn.textContent=squareShout? '平方包（點選卡舉報）':'平方包大聲公'})
    startBtn.addEventListener('click',start)
    rollBtn.addEventListener('click',rollDice)
    endBtn.addEventListener('click',()=>{
      // compute winner by pile size
      const winner = playersData.reduce((a,b)=>a.pile.length>=b.pile.length?a:b)
      alert('遊戲結束！包山王: '+winner.name+'（'+winner.pile.length+' 張）')
    })

    // init
    start()
    // responsive re-render
    window.addEventListener('resize',()=>renderTable())
  </script>
</body>
</html>
