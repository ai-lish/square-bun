<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平方包 - 練習模式</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f3ef;
      --primary: #1a1a2e;
      --accent: #e94560;
      --accent-dark: #c23a51;
      --gold: #f5a623;
      --card-bg: #fff;
      --card-front: #fff;
      --card-shadow: 0 3px 12px rgba(0,0,0,0.1);
      --text: #2d2d2d;
      --text-dim: #888;
      --success: #00c853;
      --danger: #ff3b5c;
      --border: #e8e4de;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
    body { font-family: 'Noto Sans HK', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; }

    /* ===== HEADER ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: white; flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 17px; font-weight: 900; color: var(--accent); }
    .score-badge { background: #fff0f3; border: 2px solid var(--accent); border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 700; color: var(--accent); }
    .score-badge span { color: var(--accent-dark); }
    .score-badge .score-delta {
      display: inline-block; font-size: 12px; font-weight: 900; margin-left: 4px;
      animation: scoreDelta 0.9s ease-out forwards; pointer-events: none;
    }
    .score-badge .score-delta.pos { color: var(--success); }
    .score-badge .score-delta.neg { color: var(--danger); }
    @keyframes scoreDelta {
      0%  { opacity: 1; transform: translateY(0); }
      60% { opacity: 1; transform: translateY(-12px); }
      100%{ opacity: 0; transform: translateY(-18px); }
    }
    .rules-btn { background: transparent; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; padding: 4px 8px; font-family: 'Noto Sans HK', sans-serif; }

    /* ===== DICE ZONE ===== */
    .dice-zone {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; padding: 10px 16px; background: white; flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .dice-pair { display: flex; align-items: center; gap: 10px; }
    .dice {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: #fefefe; border: 2px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s;
    }
    .dice.rolling { animation: diceRoll 0.5s ease-out; }
    @keyframes diceRoll { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(0.8)} 100%{transform:rotate(360deg) scale(1)} }
    .dice svg { display: block; border-radius: 10px; }
    .dice-slash { font-size: 22px; color: #ccc; font-weight: 300; }
    .target-badge {
      background: var(--accent); color: white; border-radius: 12px;
      padding: 7px 14px; font-size: 13px; font-weight: 700;
      min-width: 90px; text-align: center;
      box-shadow: 0 3px 10px rgba(233,69,96,0.3);
    }
    .target-badge.disabled { background: #ddd; color: #999; box-shadow: none; }
    .target-badge.gold-bg { background: var(--gold); box-shadow: 0 3px 10px rgba(245,166,35,0.4); }
    .btn-sb-dice {
      padding: 7px 14px; font-size: 12px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Noto Sans HK', sans-serif;
      background: linear-gradient(135deg, var(--gold), #e09000);
      color: white; box-shadow: 0 3px 8px rgba(245,166,35,0.4);
      transition: transform 0.1s, opacity 0.1s;
      min-height: 38px;
    }
    .btn-sb-dice:active { transform: scale(0.95); }
    .btn-sb-dice:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-sb-dice.active { background: var(--accent); box-shadow: 0 3px 8px rgba(233,69,96,0.4); }

    /* ===== CARD AREA ===== */
    .card-area {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px; overflow: hidden; position: relative;
    }
    .open-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; min-height: 28px; }
    .open-status-text { font-size: 12px; color: var(--text-dim); }
    .open-dots { display: flex; gap: 5px; }
    .open-dot { width: 8px; height: 8px; border-radius: 50%; background: #e8e4de; border: 2px solid #ccc; transition: background 0.2s, border-color 0.2s; }
    .open-dot.revealed { background: var(--accent); border-color: var(--accent); }

    .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; width: 100%; max-width: 300px; }

    .p-card {
      aspect-ratio: 3/4; background: white; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.12s, border-color 0.12s;
      box-shadow: var(--card-shadow); border: 2px solid transparent; min-height: 68px; position: relative;
    }
    .p-card:active { transform: scale(0.95); }
    .p-card.face-down { background: linear-gradient(135deg, #f0ece6, #e8e4de); cursor: default; border-color: #d8d4cc; }
    .p-card.face-down:active { transform: none; }
    .p-card.face-down .card-back { font-size: 26px; color: #aaa; font-weight: 900; }
    .p-card.selected { background: var(--accent); border-color: var(--accent-dark); transform: scale(1.05); box-shadow: 0 6px 14px rgba(233,69,96,0.4); }
    .p-card.correct { background: var(--success); animation: correctPop 0.4s ease; }
    .p-card.wrong { background: var(--danger); animation: wrongShake 0.4s ease; }
    .p-card.hint { background: rgba(0,200,83,0.12); border-color: var(--success); }
    .p-card.hint::after { content: '✓'; position: absolute; top: 3px; right: 5px; font-size: 10px; color: var(--success); }
    .p-card.square-bun-card { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); animation: sbPulse 1.5s infinite; }

    /* ===== CARD BACKGROUND BY PHASE ===== */
    .cards-grid.dice-rolled .p-card:not(.face-down) {
      background: rgba(0, 200, 83, 0.12);
    }
    .cards-grid.squarebun-mode .p-card:not(.face-down) {
      background: rgba(255, 152, 0, 0.15);
    }
    .cards-grid.dice-rolled .p-card:not(.face-down).selected {
      background: var(--accent);
    }
    .cards-grid.squarebun-mode .p-card:not(.face-down).selected {
      background: var(--gold);
    }
    @keyframes sbPulse { 0%,100%{box-shadow:0 3px 10px rgba(233,69,96,0.3)} 50%{box-shadow:0 3px 20px rgba(233,69,96,0.6)} }
    .p-card.square-bun-card .card-num { color: white; }
    .p-card.square-bun-card.selected { background: var(--gold); animation: none; box-shadow: 0 6px 14px rgba(245,166,35,0.5); }
    @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .card-num { font-size: 24px; font-weight: 900; color: var(--primary); }
    .card-divs { font-size: 8px; color: var(--text-dim); margin-top: 2px; text-align: center; line-height: 1.2; padding: 0 3px; }
    .p-card.selected .card-divs, .p-card.correct .card-divs, .p-card.wrong .card-divs { color: rgba(255,255,255,0.85); }

    /* ===== DIVS TOOLTIP (click card to show divisors) ===== */
    .card-divs-tooltip {
      position: fixed; background: #1a1a2e; color: white; border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 600; z-index: 300;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3); pointer-events: none;
      opacity: 0; transition: opacity 0.15s; white-space: nowrap;
    }
    .card-divs-tooltip.show { opacity: 1; }
    .card-divs-tooltip .tip-num { font-size: 16px; font-weight: 900; color: #ffd700; margin-bottom: 3px; }
    .card-divs-tooltip .tip-divs { color: #a8d8ea; font-size: 12px; }

    /* ===== STATUS ===== */
    .status-bar {
      text-align: center; padding: 7px 14px; font-size: 13px; font-weight: 700;
      color: var(--text-dim); flex-shrink: 0; min-height: 34px;
      display: flex; align-items: center; justify-content: center; background: white;
    }
    .status-bar.success { color: var(--success); }
    .status-bar.danger { color: var(--danger); }
    .status-bar.gold { color: #d4910e; }
    .status-bar.info { color: #0097a7; }

    /* ===== BOTTOM CONTROLS ===== */
    .controls {
      display: flex; gap: 7px; padding: 9px 12px;
      padding-bottom: max(9px, env(safe-area-inset-bottom));
      background: white; flex-shrink: 0; border-top: 1px solid var(--border);
    }
    .btn {
      flex: 1; padding: 12px 5px; font-size: 12px; font-weight: 700;
      border: none; border-radius: 11px; cursor: pointer;
      transition: transform 0.1s, opacity 0.1s; font-family: 'Noto Sans HK', sans-serif; min-height: 46px;
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:disabled:active { transform: none; }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 3px 8px rgba(233,69,96,0.3); }
    .btn-secondary { background: #f0f0f5; color: var(--primary); }
    .btn-ghost { background: #f5f5f5; color: var(--text-dim); }
    .btn-green { background: linear-gradient(135deg, #38a169, #276749); color: white; box-shadow: 0 3px 8px rgba(56,161,105,0.4); }
    .btn-gold { background: linear-gradient(135deg, var(--gold), #e09000); color: white; box-shadow: 0 3px 8px rgba(245,166,35,0.4); }
    .btn-red { background: linear-gradient(135deg, #e53e3e, #c53030); color: white; box-shadow: 0 3px 8px rgba(229,62,62,0.4); }
    @keyframes btnPulse {
      0%  { transform: scale(1); }
      40% { transform: scale(1.08); }
      70% { transform: scale(0.97); }
      100%{ transform: scale(1); }
    }
    .btn.pulse-ok  { animation: btnPulse 0.45s ease; }
    .btn.pulse-bad { animation: btnPulse 0.45s ease; box-shadow: 0 0 0 3px var(--danger); }

    /* ===== RULES MODAL ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 20px; padding: 26px; max-width: 340px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 20px; font-weight: 900; color: var(--accent); margin-bottom: 18px; text-align: center; }
    .modal-rule { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .modal-rule-icon { font-size: 20px; flex-shrink: 0; width: 30px; text-align: center; }
    .modal-rule-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .modal-rule-text strong { color: var(--accent); }
    .modal-close { width: 100%; margin-top: 18px; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans HK', sans-serif; }

    /* ===== SETUP SCREEN ===== */
    #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 28px 24px; gap: 22px; background: linear-gradient(160deg, #fff5f5 0%, #faf8f4 100%); }
    .setup-logo { text-align: center; }
    .setup-logo h1 { font-size: 34px; font-weight: 900; background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .setup-logo p { color: var(--text-dim); font-size: 15px; }
    .setup-card-count { width: 100%; max-width: 280px; }
    .setup-card-count label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 10px; text-align: center; }
    .count-selector { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .count-btn { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--accent); background: white; color: var(--accent); font-size: 22px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans HK', sans-serif; transition: all 0.15s; box-shadow: 0 2px 8px rgba(233,69,96,0.15); }
    .count-btn:active { background: var(--accent); color: white; }
    .count-display { font-size: 32px; font-weight: 900; width: 50px; text-align: center; color: var(--accent); }
    .count-display span { font-size: 13px; font-weight: 400; color: var(--text-dim); }
    .setup-btns { display: flex; gap: 10px; width: 100%; max-width: 280px; }
    .setup-btn { flex: 1; padding: 15px 12px; border-radius: 14px; border: 2px solid #e8e4de; background: white; color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; font-family: 'Noto Sans HK', sans-serif; }
    .setup-btn:active { border-color: var(--accent); background: #fff0f3; }
    .setup-btn .btn-label { font-size: 15px; margin-bottom: 3px; color: var(--accent); }
    .setup-btn .btn-desc { font-size: 11px; color: var(--text-dim); font-weight: 400; }
    .setup-rules-link { color: var(--text-dim); font-size: 14px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .start-btn { width: 100%; max-width: 280px; padding: 16px; font-size: 17px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: white; border: none; border-radius: 14px; font-weight: 900; cursor: pointer; font-family: 'Noto Sans HK', sans-serif; box-shadow: 0 6px 20px rgba(233,69,96,0.4); transition: transform 0.15s; }
    .start-btn:active { transform: scale(0.97); }

    @media (min-width: 400px) { .cards-grid { max-width: 360px; gap: 11px; } .p-card { min-height: 80px; } .card-num { font-size: 28px; } }
  </style>
</head>
<body>
  <div id="setup-screen">
    <div class="setup-logo"><h1>🎯 平方包</h1><p>練習模式 · 獨自修煉</p></div>
    <div class="setup-card-count">
      <label>桌面卡數（2–6張）</label>
      <div class="count-selector">
        <button class="count-btn" onclick="adjustCount(-1)">−</button>
        <div class="count-display"><span id="count-val">4</span><span> 張</span></div>
        <button class="count-btn" onclick="adjustCount(1)">+</button>
      </div>
    </div>
    <div class="setup-rules-link" onclick="showRules()">📖 查看遊戲規則</div>
    <button class="start-btn" onclick="startGame()">開始練習 🎲</button>
  </div>

  <div id="game-screen" style="display:none; height:100%; flex-direction:column;">
    <div class="header">
      <div class="header-title">🎯 平方包</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="score-badge">得分 <span id="score">0</span></div>
        <button class="rules-btn" onclick="showRules()">📖</button>
      </div>
    </div>
    <div class="dice-zone">
      <div class="dice-pair">
        <div class="dice" id="dice1"></div>
        <span class="dice-slash">/</span>
        <div class="dice" id="dice2"></div>
      </div>
      <button class="btn btn-gold btn-sb-dice" id="btn-sb" onclick="triggerSquareBun()">🎤 平方包</button>
      <div class="target-badge disabled" id="target-badge">開卡後擲骰</div>
    </div>
    <div class="card-area">
      <div class="open-status">
        <span class="open-status-text" id="open-status-text">已開 0 / 4 張</span>
        <div class="open-dots" id="open-dots"></div>
      </div>
      <div class="cards-grid" id="cards-grid"></div>
    </div>
    <div class="card-divs-tooltip" id="divs-tooltip"></div>
    <div class="status-bar" id="status-bar">請先開卡</div>
    <div class="controls">
      <button class="btn btn-secondary" id="btn-open" onclick="openOneCard()">🔓 開卡</button>
      <button class="btn btn-primary" id="btn-dice" onclick="rollDice()" disabled>🎲 擲骰</button>
      <button class="btn btn-ghost" id="btn-confirm" onclick="confirmPicks()" disabled>✓ 核對</button>
    </div>
  </div>

  <div class="modal-overlay" id="rules-modal">
    <div class="modal">
      <h2>📖 遊戲規則</h2>
      <div class="modal-rule"><div class="modal-rule-icon">1️⃣</div><div class="modal-rule-text">開卡：按「開卡」按鈕，一張一張揭開卡牌。所有卡揭開後才能擲骰。</div></div>
      <div class="modal-rule"><div class="modal-rule-icon">2️⃣</div><div class="modal-rule-text">擲骰：擲出兩粒骰子，目標是找出<strong>可被骰子數字整除</strong>的卡牌。</div></div>
      <div class="modal-rule"><div class="modal-rule-icon">🎤</div><div class="modal-rule-text"><strong>平方包</strong>：擲骰後可隨時按，選擇一張<strong>平方數卡（1,4,9,16...）</strong>，直接收走得分。</div></div>
      <div class="modal-rule"><div class="modal-rule-icon">🖐️</div><div class="modal-rule-text">揀卡：<strong>最多選擇 2 張卡</strong>（兩隻手）。選擇可被整除的卡。</div></div>
      <div class="modal-rule"><div class="modal-rule-icon">➕</div><div class="modal-rule-text">補卡：確認後卡牌自動補充<strong>一張</strong>。</div></div>
      <div class="modal-rule"><div class="modal-rule-icon">✅</div><div class="modal-rule-text">結算：揀啱加分，揀錯扣分。如果冇啱嘅卡，直接確認跳過。平方包卡自動得分。</div></div>
      <button class="modal-close" onclick="closeRules()">知道了！</button>
    </div>
  </div>

  <script>
    const SQUARES = new Set([1,4,9,16,25,36,49,64,81]);
    function getDivisors(n){const d=[];for(let i=1;i<=n;i++)if(n%i===0)d.push(i);return d;}
    const ALL_CARDS=[];for(let i=1;i<=88;i++){ALL_CARDS.push({n:i,divs:getDivisors(i),sq:SQUARES.has(i)});}
    let cardCount=4,deck=[],table=[],revealed=[],selected=new Set(),dice=[null,null],score=0;
    let phase='closed',sbMode=false,sbPrevPhase='closed',maxSelect=2;

    function adjustCount(delta){cardCount=Math.max(2,Math.min(6,cardCount+delta));document.getElementById('count-val').textContent=cardCount;}
    function showRules(){document.getElementById('rules-modal').classList.add('show');}
    function closeRules(){document.getElementById('rules-modal').classList.remove('show');}
    function shuffle(a){const r=Array.from(a);for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

    function startGame(){
      document.getElementById('setup-screen').style.display='none';
      document.getElementById('game-screen').style.display='flex';
      score=0;document.getElementById('score').textContent=score;
      startRound();
    }

    function startRound(){
      deck=shuffle(ALL_CARDS);table=deck.splice(0,cardCount);revealed=new Array(cardCount).fill(false);
      selected.clear();dice=[null,null];phase='closed';sbMode=false;
      renderDiceSVG(document.getElementById('dice1'),0);renderDiceSVG(document.getElementById('dice2'),0);
      document.getElementById('target-badge').textContent='開卡後擲骰';document.getElementById('target-badge').className='target-badge disabled';
      document.getElementById('status-bar').textContent='請按「開卡」揭開卡牌';document.getElementById('status-bar').className='status-bar';
      document.getElementById('btn-open').disabled=false;document.getElementById('btn-open').className='btn btn-green';
      document.getElementById('btn-dice').disabled=true;document.getElementById('btn-dice').className='btn btn-ghost';
      document.getElementById('btn-sb').disabled=false;document.getElementById('btn-sb').className='btn btn-gold btn-sb-dice';document.getElementById('btn-sb').textContent='🎤 平方包';
      document.getElementById('btn-confirm').disabled=true;document.getElementById('btn-confirm').className='btn btn-ghost';
      const grid=document.getElementById('cards-grid');grid.classList.remove('dice-rolled','squarebun-mode');
      renderOpenDots();renderCards(false);
    }

    function renderOpenDots(){
      const dots=document.getElementById('open-dots');dots.innerHTML='';
      for(let i=0;i<cardCount;i++){const d=document.createElement('div');d.className='open-dot'+(revealed[i]?' revealed':'');dots.appendChild(d);}
      document.getElementById('open-status-text').textContent=`已開 ${revealed.filter(Boolean).length} / ${cardCount} 張`;
    }

    function openOneCard(){
      const ni=revealed.findIndex(r=>!r);if(ni===-1)return;
      revealed[ni]=true;renderOpenDots();renderCards(false);
      if(revealed.every(Boolean)){
        phase='open';
        document.getElementById('btn-open').disabled=true;document.getElementById('btn-open').className='btn btn-ghost';
        document.getElementById('btn-dice').disabled=false;document.getElementById('btn-dice').className='btn btn-green';
        document.getElementById('status-bar').textContent='可以擲骰，或直接用平方包！';document.getElementById('status-bar').className='status-bar gold';
      }else{
        document.getElementById('btn-open').className='btn btn-green';
        document.getElementById('btn-dice').className='btn btn-ghost';
        document.getElementById('status-bar').textContent=`再揭 ${revealed.filter(r=>!r).length} 張卡`;
        document.getElementById('status-bar').className='status-bar';
      }
    }

    function renderCards(showDivs){
      const grid=document.getElementById('cards-grid');grid.innerHTML='';
      table.forEach((card,i)=>{
        const el=document.createElement('div');let cls='p-card';
        if(!revealed[i]){cls+=' face-down';}else{if(card.sq)cls+=' square-bun-card';if(selected.has(i))cls+=' selected';}
        el.className=cls;
        if(!revealed[i]){el.innerHTML='<div class="card-back">?</div>';}else{
          const divsHtml=showDivs?`<div class="card-divs">${card.divs.slice(0,3).join(', ')}${card.divs.length>3?'...':''}</div>`:'';
          el.innerHTML=`<div class="card-num">${card.n}</div>${divsHtml}`;
          el.onclick=()=>handleCardClick(i);
        }
        if(card._new){el.classList.add('adding');card._new=false;}
        grid.appendChild(el);
      });
      if(sbMode&&!showDivs){
        document.querySelectorAll('.p-card').forEach((el,i)=>{
          if(revealed[i]&&table[i].sq&&!selected.has(i))el.classList.add('hint');
        });
      }
    }

    function handleCardClick(i){
      if(!revealed[i]||phase==='result')return;

      if(sbMode){
        if(selected.has(i)){selected.delete(i);}else{selected.clear();selected.add(i);}
        renderCards(false);updateConfirmBtn();return;
      }

      // Show divisors tooltip for this card
      const card=table[i];
      showDivsTip(i);

      // Normal mode: max 2 selections
      if(!selected.has(i)&&selected.size>=maxSelect){setStatus('最多揀2張！','danger');return;}
      if(selected.has(i)){selected.delete(i);}else{selected.add(i);}
      renderCards(false);updateConfirmBtn();updateStatusForPhase();
    }

    let divsTipTimer=null;
    function showDivsTip(cardIndex){
      const card=table[cardIndex];
      const tip=document.getElementById('divs-tooltip');
      tip.innerHTML=`<div class="tip-num">${card.n}</div><div class="tip-divs">可被 ${card.divs.join(', ')} 整除</div>`;
      // Position near the card
      const cardEl=document.querySelectorAll('.p-card')[cardIndex];
      if(cardEl){
        const r=cardEl.getBoundingClientRect();
        tip.style.left=Math.min(r.left,window.innerWidth-160)+'px';
        tip.style.top=(r.top-58)+'px';
      }
      tip.classList.add('show');
      if(divsTipTimer)clearTimeout(divsTipTimer);
      divsTipTimer=setTimeout(()=>tip.classList.remove('show'),2000);
    }

    function updateConfirmBtn(){
      const btn=document.getElementById('btn-confirm');
      btn.disabled=!(phase==='dice-rolled'||phase==='squarebun');
      if(phase==='squarebun'){
        btn.className='btn btn-gold';
      }else if(phase==='dice-rolled'){
        btn.className='btn btn-green';
      }else{
        btn.className='btn btn-ghost';
      }
    }

    function updateStatusForPhase(){
      if(phase==='closed')setStatus('請先開卡','');
      else if(phase==='open')setStatus('可以擲骰，或直接用平方包！','');
      else if(phase==='dice-rolled'){
        setStatus(selected.size>0?`已選 ${selected.size}/${maxSelect} 張`:`揀啱就核對，或直接核對跳過`,selected.size>0?'gold':'');
      }else if(phase==='squarebun'){
        setStatus('🎤 平方包：選擇一張平方數卡','');
      }
    }
    function setStatus(msg,cls){const el=document.getElementById('status-bar');el.textContent=msg;el.className='status-bar'+(cls?' '+cls:'');}

    // Render a die face as SVG — val 0 shows "?"
    function renderDiceSVG(el,val){
      const q=(v)=>`<circle cx="${v}" cy="${v}" r="3.5" fill="#222"/>`;
      const qs=(...ps)=>ps.map(p=>q(p)).join('');
      const bg='fill="#fefefe"';
      let circles='';
      if(val===0){circles=`<text x="22" y="30" text-anchor="middle" font-size="22" font-weight="900" fill="#ccc" font-family="system-ui">?</text>`;}
      else if(val===1){circles=qs([22,22]);}
      else if(val===2){circles=qs([11,11],[33,33]);}
      else if(val===3){circles=qs([11,11],[22,22],[33,33]);}
      else if(val===4){circles=qs([11,11],[33,11],[11,33],[33,33]);}
      else if(val===5){circles=qs([11,11],[33,11],[22,22],[11,33],[33,33]);}
      else if(val===6){circles=qs([11,11],[33,11],[11,22],[33,22],[11,33],[33,33]);}
      el.innerHTML=`<svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><rect width="44" height="44" rx="10" ${bg}/>${circles}</svg>`;
    }

    function rollDice(){
      if(phase!=='open')return;
      dice=[Math.floor(Math.random()*6)+1,Math.floor(Math.random()*6)+1];
      const d1=document.getElementById('dice1'),d2=document.getElementById('dice2');
      d1.classList.add('rolling');d2.classList.add('rolling');
      setTimeout(()=>{renderDiceSVG(d1,dice[0]);renderDiceSVG(d2,dice[1]);d1.classList.remove('rolling');d2.classList.remove('rolling');},500);
      const targets=getTargetSet();
      document.getElementById('target-badge').textContent=`可被 ${dice[0]} 或 ${dice[1]} 整除`;
      document.getElementById('target-badge').classList.remove('disabled');
      // Check for square cards that match
      const matchingSquares=table.filter((c,i)=>revealed[i]&&c.sq&&targets.has(c.n));
      if(matchingSquares.length>0){
        document.getElementById('target-badge').classList.add('gold-bg');
      }else{
        document.getElementById('target-badge').classList.remove('gold-bg');
      }
      phase='dice-rolled';
      document.getElementById('btn-dice').className='btn btn-ghost';
      document.getElementById('btn-sb').disabled=false;
      document.getElementById('cards-grid').classList.remove('squarebun-mode');
      document.getElementById('cards-grid').classList.add('dice-rolled');
      setStatus(selected.size>0?`已選 ${selected.size}/${maxSelect} 張`:`揀啱就核對，或直接核對跳過`,'');
      updateConfirmBtn();
      setTimeout(highlightHintCards,600);
    }

    function triggerSquareBun(){
      if(phase!=='open'&&phase!=='dice-rolled'&&phase!=='closed'&&phase!=='squarebun')return;
      const wasClosed=phase==='closed';
      sbMode=!sbMode;
      const grid=document.getElementById('cards-grid');
      if(sbMode){
        selected.clear();
        document.getElementById('btn-sb').className='btn btn-gold btn-sb-dice active';
        document.getElementById('btn-sb').textContent='✕ 取消';
        sbPrevPhase=phase;
        phase='squarebun';
        grid.classList.remove('dice-rolled');
        grid.classList.add('squarebun-mode');
        setStatus('🎤 平方包：選擇一張卡牌','');
        updateConfirmBtn();
      }else{
        document.getElementById('btn-sb').className='btn btn-gold btn-sb-dice';
        document.getElementById('btn-sb').textContent='🎤 平方包';
        phase=wasClosed?'closed':'dice-rolled';
        grid.classList.remove('squarebun-mode');
        if(phase==='dice-rolled')grid.classList.add('dice-rolled');
        setStatus(selected.size>0?`已選 ${selected.size}/${maxSelect} 張`:`請選擇卡牌`,'');
        renderCards(false);
        updateConfirmBtn();
      }
      renderCards(false);
    }

    function highlightHintCards(){
      if(phase!=='dice-rolled')return;
      const targets=getTargetSet();
      document.querySelectorAll('.p-card').forEach((el,i)=>{
        if(!revealed[i])return;
        if(targets.has(table[i].n))el.classList.add('hint');else el.classList.remove('hint');
      });
    }

    function getTargetSet(){
      const s=new Set();
      if(dice[0]===null)return s;
      for(const d of dice)for(let i=1;i<=88;i++)if(i%d===0)s.add(i);
      return s;
    }

    function confirmPicks(){
      if(phase!=='dice-rolled'&&phase!=='squarebun')return;

      if(phase==='squarebun'){
        phase='result';
        renderCards(true); // show divisors
        setTimeout(()=>{
          const cards=document.querySelectorAll('.p-card');
          const selectedIdx=selected.values().next().value;
          const isSquare=table[selectedIdx].sq;
          if(isSquare){
            cards[selectedIdx].classList.add('correct');
            score+=selected.size;
            document.getElementById('score').textContent=score;
            showFlash('gold','🎤 平方包！',`+${selected.size} 分`);
          }else{
            cards[selectedIdx].classList.add('wrong');
            score=Math.max(0,score-selected.size);
            document.getElementById('score').textContent=score;
            showFlash('danger','✗ 唔係平方數！',`-${selected.size} 分`);
          }
          setTimeout(()=>doNextRound(Array.from(selected)),1200);
        },500);
        return;
      }

      if(selected.size>0){
        const targets=getTargetSet();
        const wrongCards=[];
        const correctCards=[];
        selected.forEach(i=>{
          if(targets.has(table[i].n))correctCards.push(i);
          else wrongCards.push(i);
        });
        phase='result';
        renderCards(true); // show divisors first
        setTimeout(()=>{
          const cards=document.querySelectorAll('.p-card');
          if(wrongCards.length>0){
            wrongCards.forEach(i=>cards[i].classList.add('wrong'));
            score=Math.max(0,score-wrongCards.length);
            document.getElementById('score').textContent=score;
            showFlash('danger',`✗ 答錯！`,`-${wrongCards.length} 分`);
            // Only wrong cards are removed — correct cards stay on table
            setTimeout(()=>doNextRound(wrongCards),1200);
          }else{
            correctCards.forEach(i=>cards[i].classList.add('correct'));
            score+=correctCards.length;
            document.getElementById('score').textContent=score;
            showFlash('success',`✓ 全對！`,`+${correctCards.length} 分`);
            // All selected are correct — remove them all from table
            setTimeout(()=>doNextRound(Array.from(selected)),1200);
          }
        },500);
        return;
      }

      // No cards selected — let player re-roll instead of penalty
      phase='result';
      renderCards(true); // show divisors so player can see why
      setTimeout(()=>{
        showFlash('skip','⏭️ 冇夾到！','可再擲骰');
        // Clear dice and set phase='open' so player can re-roll
        dice=[null,null];
        renderDiceSVG(document.getElementById('dice1'),0);
        renderDiceSVG(document.getElementById('dice2'),0);
        phase='open';
        document.getElementById('btn-dice').disabled=false;
        document.getElementById('btn-dice').className='btn btn-green';
        document.getElementById('target-badge').textContent='開卡後擲骰';
        document.getElementById('target-badge').className='target-badge disabled';
        document.getElementById('cards-grid').classList.remove('dice-rolled');
        updateConfirmBtn();
        setTimeout(()=>{
          renderCards(false);
          setStatus(selected.size>0?`已選 ${selected.size}/${maxSelect} 張`:`揀啱就核對，或直接核對跳過`,'');
        },500);
      },800);
    }

    function doNextRound(removeIndices){
      const toRemove=new Set(removeIndices);
      // Remove cards from table (wrong cards are discarded, not returned to deck)
      table=table.filter((_,i)=>!toRemove.has(i));
      revealed=revealed.filter((_,i)=>!toRemove.has(i));
      selected.clear();sbMode=false;
      // Replenish table to cardCount — draw from top of shuffled deck
      while(table.length<cardCount&&deck.length>0){table.push(deck.pop());revealed.push(false);}
      // If deck is empty or insufficient, reshuffle ALL_CARDS and continue
      if(table.length<cardCount){deck=shuffle(ALL_CARDS);while(table.length<cardCount){table.push(deck.pop());revealed.push(false);}}
      phase='closed';dice=[null,null];
      renderDiceSVG(document.getElementById('dice1'),0);renderDiceSVG(document.getElementById('dice2'),0);
      document.getElementById('target-badge').textContent='開卡後擲骰';document.getElementById('target-badge').className='target-badge disabled';
      document.getElementById('btn-open').disabled=false;document.getElementById('btn-open').className='btn btn-green';
      document.getElementById('btn-dice').disabled=true;document.getElementById('btn-dice').className='btn btn-ghost';
      document.getElementById('btn-sb').disabled=false;document.getElementById('btn-sb').className='btn btn-gold btn-sb-dice';document.getElementById('btn-sb').textContent='🎤 平方包';
      document.getElementById('btn-confirm').disabled=true;document.getElementById('btn-confirm').className='btn btn-ghost';
      const grid=document.getElementById('cards-grid');grid.classList.remove('dice-rolled','squarebun-mode');
      setStatus('請按「開卡」揭開新一回合','');
      renderOpenDots();renderCards(false);
    }

    function showFlash(type,text,sub){
      // Non-blocking feedback: status-bar + score delta + button pulse
      const statusEl=document.getElementById('status-bar');
      const scoreEl=document.getElementById('score');
      const prevScore=parseInt(scoreEl.textContent)||0;
      // 1. Status bar flash
      const colorMap={success:'success',danger:'danger',gold:'gold',skip:'info'};
      const iconMap={success:'✓',danger:'✗',gold:'🎤',skip:'⏭️'};
      statusEl.className='status-bar '+colorMap[type];
      statusEl.textContent=iconMap[type]+' '+text+(sub?('  '+sub):'');
      // 2. Score delta animation
      if(sub&&(type==='success'||type==='danger'||type==='gold')){
        const delta=sub.match(/[+-]?\d+/)?.[0]||'';
        const deltaEl=document.createElement('span');
        deltaEl.className='score-delta '+(delta.startsWith('-')?'neg':'pos');
        deltaEl.textContent=delta;
        scoreEl.parentNode.appendChild(deltaEl);
        setTimeout(()=>deltaEl.remove(),900);
      }
      // 3. Confirm button pulse
      const btn=document.getElementById('btn-confirm');
      btn.classList.remove('pulse-ok','pulse-bad');
      void btn.offsetWidth; // force reflow
      btn.classList.add(type==='danger'?'pulse-bad':'pulse-ok');
      // Reset status after 1.1s
      setTimeout(()=>{
        statusEl.className='status-bar';
        setStatus(selected.size>0?`已選 ${selected.size}/${maxSelect} 張`:`揀啱就核對，或直接核對跳過`,'');
      },1100);
    }
  </script>
